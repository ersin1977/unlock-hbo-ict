<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unlock HBO-ICT</title>
<style>
  :root{
    --bg:#12140C; --panel:#1F230F; --panel2:#191C0E; --line:#343A1E;
    --olive:#9EA601; --lime:#BCD400; --amber:#E5A93A;
    --light:#F6F8F0; --muted:#AEB39C; --muted2:#7E8568;
    --ok:#BCD400; --okbg:#212a0d; --wrongbg:#2a230d;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--light);font-family:var(--sans);line-height:1.5;
    padding:20px 16px 60px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:600px;margin:0 auto}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.18em;color:var(--lime);
    text-transform:uppercase;margin:0 0 6px}
  h1{font-family:var(--mono);font-size:26px;line-height:1.15;margin:0 0 4px;font-weight:700}
  h1 .g{color:var(--lime)}
  .sub{color:var(--muted);font-size:15px;margin:0 0 18px}
  .progress{font-family:var(--mono);letter-spacing:.18em;font-size:24px;color:var(--lime);
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    text-align:center;margin:0 0 20px}
  .progress small{display:block;font-size:11px;letter-spacing:.08em;color:var(--muted2);margin-top:6px}
  .story{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--lime);
    border-radius:10px;padding:14px 16px;margin:0 0 22px;font-size:15px;color:#E9ECDD}
  .story b{color:var(--lime)}
  .hintbox{background:var(--panel2);border:1px dashed var(--olive);border-radius:12px;padding:16px;
    margin:18px 0;font-size:15.5px;font-style:italic;color:#EEF1E2}
  .hintbox .lbl{display:block;font-family:var(--mono);font-style:normal;font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:14px 14px 12px;margin:0 0 12px}
  .card .q{font-size:15px;margin:0 0 10px;color:#EEF1E2;font-weight:600}
  .card.correct{border-color:var(--ok);background:var(--okbg)}
  .card.wrong{border-color:var(--amber);background:var(--wrongbg)}
  .card .badge{display:none;font-family:var(--mono);font-size:11px;letter-spacing:.05em;margin-top:9px}
  .card.correct .badge.ok{display:inline-block;color:var(--lime)}
  .card.wrong .badge.no{display:inline-block;color:var(--amber)}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border:1px solid var(--line);
    border-radius:9px;margin:6px 0;cursor:pointer;background:#0E1108;font-size:14.5px}
  .opt:hover{border-color:var(--muted2)}
  .opt input{margin-top:3px;accent-color:var(--lime);flex:0 0 auto}
  input[type=text],input[type=number]{width:100%;background:#0E1108;color:var(--light);
    border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-size:15px;font-family:var(--sans)}
  input:focus-visible,.opt:focus-within{outline:2px solid var(--lime);outline-offset:2px;border-color:var(--lime)}
  .nonscore{margin-top:14px;border-top:1px dashed var(--line);padding-top:8px}
  .nonscore .tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted2);text-transform:uppercase}
  button{font-family:var(--mono);font-size:14px;letter-spacing:.04em;border-radius:10px;
    padding:13px 18px;cursor:pointer;border:1px solid transparent;font-weight:700}
  .btn-go{background:var(--lime);color:#16180D;width:100%;margin-top:6px}
  .btn-go:hover{background:#cde400}
  .btn-ghost{background:transparent;color:var(--muted);border-color:var(--line)}
  .btn-ghost:hover{color:var(--light);border-color:var(--muted2)}
  button:focus-visible{outline:2px solid var(--lime);outline-offset:2px}
  .status{font-family:var(--mono);font-size:13px;margin:14px 0 0;min-height:18px;color:var(--amber);text-align:center}
  .reveal{margin:20px 0 0;border:1.5px solid var(--lime);border-radius:14px;background:var(--panel);
    padding:22px 18px;text-align:center}
  .reveal .granted{font-family:var(--mono);font-size:13px;letter-spacing:.16em;color:var(--lime);margin:0 0 8px}
  .reveal .big{font-family:var(--mono);font-size:56px;font-weight:700;color:var(--light);letter-spacing:.08em;margin:4px 0 8px;line-height:1}
  .reveal p{font-size:14.5px;color:#E9ECDD;margin:6px 0 0}
  .lock{width:34px;height:34px;display:block;margin:0 auto 10px}
  .note{margin:26px 0 0;border-top:1px solid var(--line);padding-top:14px;font-size:12.5px;color:var(--muted2);line-height:1.55}
  /* beheer */
  .field{margin:14px 0}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted2);margin-bottom:6px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .qrgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:20px}
  .qrcard{background:#fff;color:#16180D;border-radius:12px;padding:14px;text-align:center}
  .qrcard h4{margin:0 0 4px;font-size:14px;font-family:var(--mono)}
  .qrcard .meta{font-size:11px;color:#444;margin:0 0 8px;min-height:30px}
  .qrcard img{width:100%;max-width:200px;height:auto;background:#fff}
  .reftable{width:100%;border-collapse:collapse;margin-top:18px;font-size:13px}
  .reftable th,.reftable td{border:1px solid var(--line);padding:7px 9px;text-align:left}
  .reftable th{background:var(--panel);color:var(--lime);font-family:var(--mono);font-size:12px}
  .sectiontitle{font-family:var(--mono);font-size:13px;letter-spacing:.08em;color:var(--olive);
    text-transform:uppercase;margin:24px 0 4px}
  @media print{
    body{background:#fff;color:#000;padding:0}
    .noprint{display:none!important}
    .qrcard{border:1px solid #ccc;page-break-inside:avoid}
    .qrgrid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>

 {q:"Wat doe je als je een opdracht niet begrijpt?",t:"radio",o:["Niets","Wachten tot de deadline","Je docent om uitleg vragen","De opdracht overslaan"],c:2},

 {q:"Wat betekent het als een vak 5 EC waard is?",t:"radio",o:["Dat het ongeveer 5 studiepunten oplevert","Dat het 5 lessen heeft","Dat het 5 weken duurt","Dat je een 5 moet halen"],c:0},
 {q:"Wat is een goede gewoonte bij het volgen van eerstejaarsvakken?",t:"radio",o:["Op tijd beginnen met opdrachten","Alles bewaren tot de laatste dag","Alleen leren voor toetsen","Nooit vragen stellen"],c:0},
 {q:"Waar of niet waar: feedback van een docent kan je helpen om beter te worden.",t:"radio",o:TF,c:0},
 {q:"Hoeveel verschillende docenten denk je gemiddeld te hebben in je eerste studiejaar?",t:"open",score:false},
 {q:"Welk vak lijkt jou op dit moment het interessantst en waarom?",t:"open",score:false,text:true},
 {q:"Welke zin hoor je waarschijnlijk het vaakst van een docent?",t:"radio",o:["\u2018Staat in Brightspace.\u2019","\u2018Hebben jullie nog vragen?\u2019","\u2018Dit komt terug op het tentamen.\u2019","Alle bovenstaande antwoorden"],c:3,score:false},
 {q:"Wat is volgens jou de grootste uitdaging van het eerste studiejaar?",t:"radio",o:["Plannen","Nieuwe mensen leren kennen","De lesstof","Alles combineren","Alle bovenstaande kunnen goed zijn"],score:false}
]
};

/* ============ STATE ============ */
function loadState(){
  try{var s=JSON.parse(localStorage.getItem("unlock_state")); if(s) return s;}catch(e){}
  return {group:null, done:{}};
}
function saveState(s){ try{localStorage.setItem("unlock_state",JSON.stringify(s));}catch(e){} }
var STATE = loadState();

/* rotatie: groep g start bij categorie g, daarna +1 */
function rotationOrder(g){ var a=[]; for(var i=0;i<7;i++){ a.push(((g-1+i)%7)+1); } return a; }
function nextCategory(){
  if(!STATE.group) return null;
  var order=rotationOrder(STATE.group);
  for(var i=0;i<order.length;i++){ if(!STATE.done[order[i]]) return order[i]; }
  return null; // alles klaar
}

/* ============ HELPERS ============ */
var app=document.getElementById("app");
function el(html){ var d=document.createElement("div"); d.innerHTML=html; return d.firstElementChild; }
function progressBar(){
  var slots="";
  for(var i=1;i<=7;i++){ slots += STATE.done[i] ? STATE.done[i] : "\u25A1"; slots+=(i<7?" ":""); }
  var count=Object.keys(STATE.done).length;
  return '<div class="progress">'+slots+'<small>'+count+' / 7 categorie\u00EBn voltooid</small></div>';
}
function lockSVG(){return '<svg class="lock" viewBox="0 0 24 24" fill="none" stroke="#BCD400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>';}
function norm(v){ return (""+v).trim().toLowerCase(); }

/* ============ ROUTER ============ */
function router(){
  var h=location.hash.replace(/^#/,"");
  if(h==="beheer"){ renderBeheer(); return; }
  var m;
  if((m=h.match(/^start=(\d+)$/))){ renderStart(parseInt(m[1],10)); return; }
  if((m=h.match(/^cat=(\d+)$/))){ renderCat(parseInt(m[1],10)); return; }
  if(h==="finale"){ renderFinale(); return; }
  renderLanding();
}
window.addEventListener("hashchange",router);

/* ============ SCHERMEN ============ */
function header(){
  return '<p class="kicker">&gt; De Haagse Hogeschool \u00B7 introductieweek</p>'+
         '<h1>Unlock <span class="g">HBO-ICT</span></h1>';
}

function renderLanding(){
  app.innerHTML = header()+
   '<p class="sub">Welkom! Scan de QR-code die je hebt gekregen om te beginnen.</p>'+
   '<div class="story">Je eerste jaar zit <b>op slot</b>. Samen met je squad kraak je zeven categorie\u00EBn, verzamel je zeven cijfers en open je de mastercode. Veel succes!</div>'+
   '<button class="btn-ghost noprint" onclick="location.hash=\'beheer\'">Beheer & QR-codes (organisatie)</button>';
}

function renderStart(g){
  if(g<1||g>7){ renderLanding(); return; }
  STATE.group=g; STATE.done={}; saveState(STATE);
  var first=g; var cat=CATS[first-1];
  app.innerHTML = header()+
   '<p class="sub">Jullie zijn <b style="color:var(--lime)">Groep '+g+'</b>.</p>'+
   progressBar()+
   '<div class="story">Welkom, squad! Het systeem kent jullie nog niet. Kraak alle zeven categorie\u00EBn om je eerste jaar te ontgrendelen. Jullie beginnen bij <b>categorie '+first+'</b>.</div>'+
   '<div class="hintbox"><span class="lbl">Zoek deze QR-code:</span>'+cat.hint+'</div>'+
   '<p class="note">Zodra jullie de QR-code gevonden hebben, scan je hem met dit toestel. Gebruik per groep \u00E9\u00E9n telefoon, zodat jullie voortgang bewaard blijft.</p>';
}

function renderCat(cn){
  if(cn<1||cn>7){ renderLanding(); return; }
  var cat=CATS[cn-1]; var qs=Q[cn];
  var body=header()+
   '<p class="sub">Categorie '+cn+' \u2014 <b>'+cat.name+'</b></p>'+
   progressBar();
  if(STATE.done[cn]){
    body+='<div class="reveal">'+lockSVG()+'<p class="granted">&gt;&gt; AL VOLTOOID</p><div class="big">'+cat.digit+'</div><p>Deze categorie hebben jullie al gehaald (cijfer '+cat.digit+', positie '+cn+').</p></div>';
    app.innerHTML=body+nextBlock(cn);
    return;
  }
  body+='<div id="quiz"></div>'+
        '<button class="btn-go" id="check">Controleer antwoorden</button>'+
        '<p class="status" id="status"></p>'+
        '<div id="result"></div>';
  app.innerHTML=body;
  var quiz=document.getElementById("quiz");
  qs.forEach(function(qo,idx){ quiz.appendChild(renderQuestion(qo,idx)); });
  document.getElementById("check").addEventListener("click",function(){ checkCat(cn); });
}

function renderQuestion(qo,idx){
  var inner='<p class="q">'+(idx+1)+'. '+qo.q+'</p>';
  var name="q"+idx;
  if(qo.t==="radio"){
    qo.o.forEach(function(opt,i){
      inner+='<label class="opt"><input type="radio" name="'+name+'" value="'+i+'"><span>'+opt+'</span></label>';
    });
  } else if(qo.t==="multi"){
    inner+='<p class="note" style="margin:0 0 6px">Kies '+(qo.max?'max. '+qo.max:'')+' antwoorden.</p>';
    qo.o.forEach(function(opt,i){
      inner+='<label class="opt"><input type="checkbox" name="'+name+'" value="'+i+'"><span>'+opt+'</span></label>';
    });
  } else if(qo.t==="open"){
    var typ=qo.text?'text':'number';
    inner+='<input type="'+typ+'" name="'+name+'" placeholder="'+(qo.text?'Typ je antwoord':'Typ een getal')+'">';
  }
  var card=el('<div class="card" id="card'+idx+'">'+inner+
    '<span class="badge ok">\u2713 juist</span><span class="badge no">nog niet juist</span></div>');
  if(qo.score===false){
    card.classList.add("nonscore");
    var tag=document.createElement("div"); tag.className="tag"; tag.textContent="LEUKE VRAAG \u2014 TELT NIET MEE";
    card.insertBefore(tag, card.firstChild);
  }
  return card;
}

function getResponse(qo,idx){
  var name="q"+idx;
  if(qo.t==="radio"){
    var r=document.querySelector('input[name="'+name+'"]:checked');
    return r?parseInt(r.value,10):null;
  } else if(qo.t==="multi"){
    var arr=[]; document.querySelectorAll('input[name="'+name+'"]:checked').forEach(function(c){arr.push(parseInt(c.value,10));});
    return arr;
  } else {
    var inp=document.querySelector('input[name="'+name+'"]'); return inp?inp.value:"";
  }
}
function isCorrect(qo,resp){
  if(qo.score===false) return true;
  if(qo.t==="radio") return resp===qo.c;
  if(qo.t==="multi"){
    if(!resp||resp.length!==qo.c.length) return false;
    var a=resp.slice().sort(), b=qo.c.slice().sort();
    for(var i=0;i<a.length;i++){ if(a[i]!==b[i]) return false; }
    return true;
  }
  if(qo.t==="open"){
    if(resp===""||resp==null) return false;
    if(qo.min!=null){ var n=parseFloat((""+resp).replace(",",".")); return !isNaN(n)&&n>=qo.min&&n<=qo.max; }
    if(typeof qo.a==="number"){ var n2=parseFloat((""+resp).replace(",",".")); return n2===qo.a; }
    return norm(resp)===norm(qo.a);
  }
  return false;
}

function checkCat(cn){
  var qs=Q[cn]; var allOk=true, scored=0, ok=0;
  qs.forEach(function(qo,idx){
    var card=document.getElementById("card"+idx);
    card.classList.remove("correct","wrong");
    var resp=getResponse(qo,idx);
    var good=isCorrect(qo,resp);
    if(qo.score!==false){
      scored++;
      if(good){ ok++; card.classList.add("correct"); }
      else { allOk=false; if(resp!==null&&!(Array.isArray(resp)&&resp.length===0)&&resp!=="") card.classList.add("wrong"); }
    }
  });
  var status=document.getElementById("status");
  var result=document.getElementById("result");
  if(allOk){
    status.textContent=ok+" / "+scored+" goed \u2014 code vrijgegeven!";
    STATE.done[cn]=CATS[cn-1].digit; saveState(STATE);
    document.getElementById("check").style.display="none";
    result.innerHTML=
      '<div class="reveal">'+lockSVG()+
      '<p class="granted">&gt;&gt; CATEGORIE '+cn+' GEKRAAKT</p>'+
      '<div class="big">'+CATS[cn-1].digit+'</div>'+
      '<p>Dit is cijfer <b>'+CATS[cn-1].digit+'</b> op <b>positie '+cn+'</b> van de mastercode.</p></div>'+
      nextBlock(cn);
    result.scrollIntoView({behavior:"smooth",block:"center"});
    // update progress bar bovenaan
    var pb=document.querySelector(".progress"); if(pb) pb.outerHTML=progressBar();
  } else {
    status.textContent=ok+" / "+scored+" goed \u2014 de juiste staan groen. Pas de rest aan.";
    result.innerHTML="";
  }
}

function nextBlock(cn){
  var nx=nextCategory();
  if(nx){
    var cat=CATS[nx-1];
    return '<div class="hintbox"><span class="lbl">Volgende QR-code \u2014 zoek deze plek:</span>'+cat.hint+'</div>'+
           '<p class="note">Gevonden? Scan de QR-code van categorie '+nx+' met dit toestel.</p>';
  }
  return '<div class="story" style="margin-top:18px"><b>Alle zeven categorie\u00EBn gehaald!</b> Tijd voor de mastercode.</div>'+
         '<button class="btn-go" onclick="location.hash=\'finale\'">Naar de mastercode \u2192</button>';
}

function renderFinale(){
  var count=Object.keys(STATE.done).length;
  var body=header()+'<p class="sub">De finale</p>'+progressBar();
  if(count<7){
    body+='<div class="story">Jullie hebben nog niet alle zeven cijfers. Ga terug en kraak de overige categorie\u00EBn.</div>';
    var nx=nextCategory();
    if(nx){ body+='<div class="hintbox"><span class="lbl">Volgende QR-code:</span>'+CATS[nx-1].hint+'</div>'; }
    app.innerHTML=body; return;
  }
  body+='<div class="story">Jullie hebben alle zeven cijfers verzameld. Voer de volledige <b>mastercode</b> in om je eerste jaar te ontgrendelen.</div>'+
        '<div class="card"><p class="q">Mastercode (7 cijfers)</p><input type="text" id="mc" inputmode="numeric" placeholder="\u2022 \u2022 \u2022 \u2022 \u2022 \u2022 \u2022"></div>'+
        '<button class="btn-go" id="unlock">Ontgrendelen</button>'+
        '<p class="status" id="status"></p><div id="result"></div>';
  app.innerHTML=body;
  document.getElementById("unlock").addEventListener("click",function(){
    var v=document.getElementById("mc").value.replace(/\s/g,"");
    if(v===MASTERCODE){
      document.getElementById("unlock").style.display="none";
      document.getElementById("status").textContent="";
      document.getElementById("result").innerHTML=
        '<div class="reveal">'+lockSVG()+'<p class="granted">&gt;&gt; ACCESS GRANTED</p>'+
        '<div class="big">'+MASTERCODE.split("").join(" ")+'</div>'+
        '<p>Jullie eerste jaar is ontgrendeld. Welkom bij HBO-ICT \u2014 tijd om te proosten! \uD83C\uDF89</p></div>';
      document.getElementById("result").scrollIntoView({behavior:"smooth",block:"center"});
    } else {
      document.getElementById("status").textContent="Nog niet juist \u2014 controleer de cijfers en hun volgorde.";
    }
  });
}

/* ============ BEHEER ============ */
function renderBeheer(){
  var base = location.origin + location.pathname;
  app.innerHTML = header()+
   '<p class="sub">Beheer \u2014 QR-codes genereren en printen</p>'+
   '<div class="story">Vul het webadres in waar deze app online staat. De QR-codes wijzen daar dan naartoe. Print de pagina, hang de <b>categorie-QR\u2019s</b> op hun verstopplek, en leg de <b>7 START-QR\u2019s</b> klaar op de startlocatie (\u00E9\u00E9n per groep).</div>'+
   '<div class="field"><label>Basis-URL van de app</label><input type="text" id="base" value="'+base+'"></div>'+
   '<div class="row noprint"><button class="btn-go" id="gen" style="width:auto">QR-codes genereren</button>'+
   '<button class="btn-ghost" onclick="window.print()">Printen</button>'+
   '<button class="btn-ghost" onclick="resetSpel()">Voortgang wissen (test)</button></div>'+
   '<div id="qrs"></div>'+
   '<div class="sectiontitle">Overzicht voor de organisatie</div>'+
   refTable()+
   '<p class="note">QR-afbeeldingen worden gemaakt met de gratis dienst api.qrserver.com (internet nodig tijdens genereren/printen). Mastercode: <b>'+MASTERCODE+'</b>.</p>';
  document.getElementById("gen").addEventListener("click",genQR);
}
function refTable(){
  var rows="";
  CATS.forEach(function(c){ rows+='<tr><td>'+c.n+'</td><td>'+c.name+'</td><td>'+c.digit+'</td><td>positie '+c.n+'</td></tr>'; });
  var rot="";
  for(var g=1;g<=7;g++){ rot+='<tr><td>Groep '+g+'</td><td>'+rotationOrder(g).join(" \u2192 ")+'</td></tr>'; }
  return '<table class="reftable"><tr><th>Cat</th><th>Categorie</th><th>Cijfer</th><th>Plek in code</th></tr>'+rows+'</table>'+
         '<div class="sectiontitle">Rotatie per groep (start \u2192 volgorde)</div>'+
         '<table class="reftable"><tr><th>Groep</th><th>Volgorde categorie\u00EBn</th></tr>'+rot+'</table>';
}
function qrImg(url){ return '<img alt="QR" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data='+encodeURIComponent(url)+'">'; }
function genQR(){
  var base=document.getElementById("base").value.trim().replace(/#.*$/,"");
  var out='<div class="sectiontitle">START-QR\u2019s (op de startlocatie, \u00E9\u00E9n per groep)</div><div class="qrgrid">';
  for(var g=1;g<=7;g++){
    var url=base+"#start="+g;
    out+='<div class="qrcard"><h4>START \u2014 Groep '+g+'</h4><div class="meta">Begint bij categorie '+g+'</div>'+qrImg(url)+'</div>';
  }
  out+='</div><div class="sectiontitle">Categorie-QR\u2019s (elk op zijn verstopplek)</div><div class="qrgrid">';
  CATS.forEach(function(c){
    var url=base+"#cat="+c.n;
    out+='<div class="qrcard"><h4>Cat '+c.n+' \u2014 '+c.name+'</h4><div class="meta">Cijfer '+c.digit+' (positie '+c.n+')<br>'+c.hint.slice(0,60)+'\u2026</div>'+qrImg(url)+'</div>';
  });
  out+='</div>';
  document.getElementById("qrs").innerHTML=out;
}
function resetSpel(){ STATE={group:null,done:{}}; saveState(STATE); alert("Voortgang gewist."); }

/* start */
router();
</script>
