<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unlock HBO-ICT — Escaperoom</title>
<style>
  :root{
    --bg:#0a0e1a; --panel:#121a2e; --panel2:#0e1424; --line:#1f2c47;
    --text:#e8edf7; --muted:#8a98b8; --accent:#34e0a1; --accent2:#3fa9ff;
    --warn:#ff5d6c; --gold:#ffd24a; --radius:16px;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
    --sans:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(1200px 700px at 50% -10%,#16213d 0%,var(--bg) 60%);
    color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:780px;margin:0 auto;padding:26px 18px 80px}
  header{text-align:center;margin-bottom:14px}
  .brand{font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
  h1{font-size:30px;margin:6px 0 2px;letter-spacing:1px}
  h1 .lock{color:var(--accent)}
  .sub{color:var(--muted);font-size:14px;line-height:1.5}

  .codebar{display:flex;justify-content:center;gap:7px;margin:18px 0 6px;flex-wrap:wrap}
  .frag{width:60px;height:62px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:var(--mono);}
  .frag .n{font-size:9px;color:var(--muted)}
  .frag .v{font-size:24px;font-weight:700;color:#34405e}
  .frag.done{border-color:var(--accent);background:rgba(52,224,161,.08)}
  .frag.done .v{color:var(--accent)}
  .frag.current{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(63,169,255,.2)}

  .card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--line);
    border-radius:var(--radius);padding:22px;margin:14px 0;box-shadow:0 12px 30px rgba(0,0,0,.35);}
  h2{margin:0 0 4px;font-size:21px}
  h3{margin:0 0 8px;font-size:17px}

  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}
  input[type=text],textarea{width:100%;background:#0c1322;border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font-size:14px;font-family:var(--sans);}
  textarea{min-height:120px;resize:vertical;line-height:1.6}
  input:focus,textarea:focus{outline:none;border-color:var(--accent2)}

  button{appearance:none;border:0;border-radius:10px;cursor:pointer;font-weight:700;padding:12px 20px;
    font-size:14px;background:var(--accent);color:#04140d;transition:transform .05s,filter .15s;margin-top:16px;}
  button:hover{filter:brightness(1.08)} button:active{transform:translateY(1px)}
  button.ghost{background:#1b2742;color:var(--text);border:1px solid var(--line)}
  button:disabled{opacity:.4;cursor:not-allowed}

  .q{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;background:#0c1322}
  .q.correct{border-color:var(--accent);background:rgba(52,224,161,.06)}
  .q.wrong{border-color:var(--warn);background:rgba(255,93,108,.06)}
  .qtext{font-size:14px;font-weight:600;margin-bottom:10px}
  .opt{display:flex;gap:9px;align-items:flex-start;padding:7px 9px;border-radius:8px;font-size:14px;cursor:pointer}
  .opt:hover{background:#101a30}
  .opt input{margin-top:3px}
  .qmark{float:right;font-family:var(--mono);font-size:12px}
  .q.correct .qmark{color:var(--accent)} .q.wrong .qmark{color:var(--warn)}

  .hint{background:rgba(63,169,255,.08);border:1px solid var(--accent2);border-radius:12px;padding:14px 16px;margin-top:14px}
  .hint .lab{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);font-family:var(--mono)}
  .hint .txt{font-size:16px;margin-top:5px}
  .reveal{margin-top:14px;text-align:center;font-family:var(--mono);background:rgba(52,224,161,.08);
    border:1px solid var(--accent);border-radius:12px;padding:14px}
  .reveal .big{font-size:34px;font-weight:800;color:var(--accent);letter-spacing:4px}
  .msg{margin-top:12px;font-size:13px;font-family:var(--mono);min-height:18px}
  .msg.err{color:var(--warn)} .msg.ok{color:var(--accent)}

  .granted{font-size:38px;font-weight:900;color:var(--accent);letter-spacing:3px;text-align:center;margin:10px 0}
  .mastercode{text-align:center;font-family:var(--mono);font-size:40px;font-weight:800;letter-spacing:10px;
    color:var(--gold);background:#0c1322;border:1px dashed var(--gold);border-radius:12px;padding:16px;margin:12px 0}
  .jobs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0}
  .job{background:#162038;border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px}

  .pill{display:inline-block;background:#162038;border:1px solid var(--line);border-radius:999px;padding:3px 10px;
    font-size:11px;color:var(--muted);font-family:var(--mono)}
  .progresstxt{text-align:center;color:var(--muted);font-size:13px;font-family:var(--mono);margin-top:4px}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:28px;line-height:1.7}
  footer a{color:var(--accent2);text-decoration:none}
  .note{font-size:12px;color:var(--muted);font-style:italic;margin-top:8px}

  /* admin / print */
  .qrgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
  .qrcard{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;color:#111;text-align:center}
  .qrcard img{width:100%;max-width:200px;height:auto}
  .qrcard .t{font-weight:700;font-size:13px;margin:6px 0 2px}
  .qrcard .d{font-size:11px;color:#555}
  @media print{
    body{background:#fff} .wrap{max-width:100%}
    .noprint{display:none!important}
    .qrgrid{grid-template-columns:repeat(2,1fr)}
    .qrcard{break-inside:avoid;border:1px solid #999}
  }
</style>
</head>
<body>

    <span class="noprint"><a href="#beheer">🛠️ Beheer &amp; QR-codes printen</a> · <a href="#reset" onclick="return confirm('Voortgang van deze squad wissen?')">opnieuw beginnen</a><br></span>
    Digitaal prototype · Module 6 — Project (Design Thinking) · Opdrachtgever: Chris Dina

<script>

      Q("Wat is een &#8216;college&#8217;?",["Een onderwijsles","Een gebouw","Een cijfer","Een pauze"],0),
      Q("Wat betekent &#8216;propedeuse&#8217;?",["Het eerstejaars diploma-onderdeel","De eindscriptie","De stage","De minor"],0),
      Q("Hoeveel EC is een gemiddelde module vaak?",["Ongeveer 15","1","60","0"],0),
      Q("Hoe begin je je studiedag het best?",["Je rooster checken","Improviseren","Thuisblijven","Gokken"],0),

      Q("Waar meld je je als bezoeker?",["Bij de receptie","In de kantine","In de lift","Op het dak"],0),
    ]},

    questions:[

const N = CATS.length;            // 7
const MASTER = CATS.map(c=>c.digit).join('');   // 7 cijfers
const JOBS = ["💻 Software Developer","🛡️ Security Specialist","🗄️ Data Engineer","☁️ Cloud Engineer","🎨 UX / Frontend"];

/* ===================== STATE (onthouden in de browser) ===================== */
const KEY='unlockHboCatState';
function load(){ try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;} }
function save(s){ localStorage.setItem(KEY, JSON.stringify(s)); }
function freshState(start){ return {team:'', members:[], start:start||0, solved:Array(N).fill(false)}; }

/* rotatievolgorde voor een team: start, start+1, … (mod N) */
function order(start){ const o=[]; for(let i=0;i<N;i++) o.push((start+i)%N); return o; }
function nextCat(state, currentK){
  const o=order(state.start);
  const startPos = (currentK==null) ? -1 : o.indexOf(currentK);
  for(let j=1;j<=N;j++){ const c=o[(startPos+j)%N]; if(!state.solved[c]) return c; }
  return null; // alles klaar
}
function allDone(state){ return state.solved.every(Boolean); }

/* ===================== PROGRESSBALK ===================== */
function drawProgress(state, currentK){
  const bar=document.getElementById('codebar'), txt=document.getElementById('progresstxt');
  if(!state){ bar.innerHTML=''; txt.textContent=''; return; }
  bar.innerHTML = CATS.map((c,i)=>`
    <div class="frag ${state.solved[i]?'done':''} ${i===currentK?'current':''}">
      <div class="n">CAT ${i+1}</div>
      <div class="v">${state.solved[i]?c.digit:'?'}</div>
    </div>`).join('');
  const done = state.solved.filter(Boolean).length;
  txt.textContent = `${done} / ${N} categorieën gekraakt`;
}

/* ===================== ROUTER ===================== */
function route(){
  const h=location.hash;
  if(h.indexOf('#reset')===0){ localStorage.removeItem(KEY); location.hash=''; location.reload(); return; }
  if(h.indexOf('#beheer')===0){ return renderAdmin(); }
  const mCat=h.match(/#cat=(\d+)/);
  if(mCat){ return renderCategory(parseInt(mCat[1],10)); }
  const mStart=h.match(/#start=(\d+)/);
  return renderStart(mStart?parseInt(mStart[1],10):null);
}
window.addEventListener('hashchange', route);

/* ===================== STARTSCHERM ===================== */
function renderStart(startOffset){
  const app=document.getElementById('app');
  let state=load();
  if(state){ drawProgress(state); return renderStatus(state); }   // al gestart → toon status
  const start = (startOffset!=null && startOffset>=0 && startOffset<N) ? startOffset : 0;
  drawProgress(null);
  app.innerHTML=`
    <section class="card">
      <h2>Welkom bij de missie 🔓</h2>
      <p class="sub">Het eerste jaar is vergrendeld. Vul je groep in; daarna krijg je een hint naar de eerste verstopte QR-code.</p>
      <label>Naam van je groep</label>
      <input type="text" id="team" placeholder="bv. De Codekrakers" maxlength="40">
      <label>Namen van de groepsleden (één per regel, max 9)</label>
      <textarea id="members" placeholder="Sara&#10;Tom&#10;Noor&#10;…"></textarea>
      <button id="startBtn">▶ Start de missie</button>
      <div class="msg" id="m"></div>
      ${startOffset==null?'<p class="note">Tip: open dit scherm via de START-QR van je groep, dan begin je bij de juiste categorie.</p>':''}
    </section>`;
  document.getElementById('startBtn').onclick=()=>{
    const team=document.getElementById('team').value.trim();
    const members=document.getElementById('members').value.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,9);
    const m=document.getElementById('m');
    if(!team){ m.className='msg err'; m.textContent='✗ Vul een groepsnaam in.'; return; }
    if(members.length<1){ m.className='msg err'; m.textContent='✗ Vul minstens één groepslid in.'; return; }
    const s=freshState(start); s.team=team; s.members=members; save(s);
    renderStatus(s); drawProgress(s);
  };
}

/* status / "waar nu heen" scherm */
function renderStatus(state){
  const app=document.getElementById('app');
  drawProgress(state);
  if(allDone(state)) return renderAccess(state);
  const nxt=nextCat(state);
  const isFirst = state.solved.every(v=>!v);
  app.innerHTML=`
    <section class="card">
      <h2>${isFirst?'Veel succes, ':'Door naar de volgende, '}${escapeHtml(state.team)}! 🚀</h2>
      <p class="sub">${state.members.map(escapeHtml).join(' · ')}</p>
      <div class="hint">
        <div class="lab">${isFirst?'Eerste QR-code zoeken':'Volgende QR-code zoeken'}</div>
        <div class="txt">${CATS[nxt].hint}</div>
      </div>
      <p class="note">Gevonden? Scan de QR-code met je telefoon om <b>${escapeHtml(CATS[nxt].name)}</b> te openen.</p>
    </section>`;
}

/* ===================== CATEGORIE met vragen ===================== */
function renderCategory(k){
  const app=document.getElementById('app');
  const state=load();
  if(!state || !state.team){
    drawProgress(null);
    app.innerHTML=`<section class="card"><h2>Scan eerst jullie START-QR</h2>
      <p class="sub">Begin met de START-QR van je groep om je groepsnaam in te vullen.</p>
      <button class="ghost" onclick="location.hash=''">Naar het startscherm</button></section>`;
    return;
  }
  if(k<0||k>=N){ location.hash=''; return; }
  drawProgress(state,k);
  const cat=CATS[k];
  if(state.solved[k]) return categorySolvedView(state,k);
  app.innerHTML=`
    <section class="card">
      <span class="pill">Categorie ${k+1} / ${N}</span>
      <h2>${escapeHtml(cat.name)}</h2>
      <p class="sub">Beantwoord <b>alle ${cat.questions.length} vragen goed</b> om het cijfer te onthullen. Fouten worden rood gemarkeerd — verbeter ze en controleer opnieuw.</p>
      <div id="qs">${cat.questions.map((q,i)=>questionHtml(q,i)).join('')}</div>
      <button id="check">Controleer antwoorden</button>
      <div class="msg" id="m"></div>
      <div id="rev"></div>
    </section>`;
  document.getElementById('check').onclick=()=>checkCategory(k);
}

function questionHtml(q,i){
  return `<div class="q" id="q${i}">
    <div class="qtext"><span class="qmark" id="mk${i}"></span>${i+1}. ${q.q}</div>
    <div class="opts">${q.opts.map((o,j)=>`
      <label class="opt"><input type="radio" name="q${i}" value="${j}"> <span>${o}</span></label>`).join('')}</div>
  </div>`;
}

function checkCategory(k){
  const cat=CATS[k]; let good=0, answered=0;
  cat.questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const box=document.getElementById('q'+i), mk=document.getElementById('mk'+i);
    box.classList.remove('correct','wrong');
    if(sel){ answered++;
      if(parseInt(sel.value,10)===q.a){ good++; box.classList.add('correct'); mk.textContent='✓ goed'; }
      else { box.classList.add('wrong'); mk.textContent='✗ fout'; }
    } else { box.classList.add('wrong'); mk.textContent='— niet beantwoord'; }
  });
  const m=document.getElementById('m');
  if(good===cat.questions.length){
    const state=load(); state.solved[k]=true; save(state);
    m.className='msg ok'; m.textContent='✔ Alles goed! Cijfer ontgrendeld.';
    document.getElementById('check').disabled=true;
    drawProgress(state,k);
    revealAfterSolve(state,k);
  } else {
    m.className='msg err';
    m.textContent=`✗ ${good} van ${cat.questions.length} goed. Verbeter de rode vragen en controleer opnieuw.`;
  }
}

function revealAfterSolve(state,k){
  const rev=document.getElementById('rev');
  let html=`<div class="reveal">Vrijgavecode-fragment<br><span class="big">${CATS[k].digit}</span></div>`;
  if(allDone(state)){
    rev.innerHTML=html;
    setTimeout(()=>renderAccess(state),900);
    return;
  }
  const nxt=nextCat(state,k);
  html+=`<div class="hint"><div class="lab">Volgende QR-code zoeken</div>
    <div class="txt">${CATS[nxt].hint}</div></div>
    <p class="note">Gevonden? Scan de QR-code om <b>${escapeHtml(CATS[nxt].name)}</b> te openen.</p>`;
  rev.innerHTML=html;
  rev.scrollIntoView({behavior:'smooth',block:'center'});
}

function categorySolvedView(state,k){
  const app=document.getElementById('app');
  const done=allDone(state); const nxt=done?null:nextCat(state,k);
  app.innerHTML=`
    <section class="card">
      <span class="pill">Categorie ${k+1} / ${N}</span>
      <h2>${escapeHtml(CATS[k].name)}</h2>
      <div class="reveal">Deze categorie is al gekraakt ✓<br><span class="big">${CATS[k].digit}</span></div>
      ${done?`<button onclick="location.hash=''">Naar de finale</button>`:`
        <div class="hint"><div class="lab">Volgende QR-code zoeken</div><div class="txt">${CATS[nxt].hint}</div></div>
        <p class="note">Scan de QR-code om <b>${escapeHtml(CATS[nxt].name)}</b> te openen.</p>`}
    </section>`;
}

/* ===================== FINALE ===================== */
function renderAccess(state){
  const app=document.getElementById('app'); drawProgress(state);
  app.innerHTML=`
    <section class="card" style="text-align:center">
      <div class="granted">ACCESS GRANTED ✅</div>
      <p class="sub">Alle ${N} categorieën gekraakt. De volledige mastercode:</p>
      <div class="mastercode">${MASTER}</div>
      <p class="sub">Welkom bij HBO-ICT — een eerste blik op het werkveld:</p>
      <div class="jobs">${JOBS.map(j=>`<div class="job">${j}</div>`).join('')}</div>
      <div style="border:2px solid var(--gold);border-radius:16px;padding:20px;margin:16px 0">
        <div style="font-size:34px">🏅</div>
        <h3 style="color:var(--gold);margin:6px 0">Missie compleet</h3>
        <p class="sub" style="margin:4px 0">Groep <b>${escapeHtml(state.team)}</b> heeft de escaperoom ontgrendeld.</p>
        <p class="sub" style="margin:4px 0">${state.members.map(escapeHtml).join(' · ')}</p>
        <span class="pill">De finale loopt direct over in de borrel 🥂</span>
      </div>
      <button class="ghost" onclick="if(confirm('Voortgang wissen en opnieuw?')){localStorage.removeItem('${KEY}');location.hash='';location.reload();}">Opnieuw spelen</button>
    </section>`;
}

/* ===================== BEHEER / QR-CODES PRINTEN ===================== */
function renderAdmin(){
  const app=document.getElementById('app'); drawProgress(null);
  const defaultBase = location.href.split('#')[0];
  app.innerHTML=`
    <section class="card noprint">
      <h2>🛠️ Beheer — QR-codes printen</h2>
      <p class="sub">Vul de webadres (URL) in waar deze app online staat. De QR-codes wijzen daar dan naartoe. Print de pagina en verstop de categorie-QR's in het gebouw; geef elke groep een eigen START-QR.</p>
      <label>Basis-URL van de app</label>
      <input type="text" id="base" value="${escapeAttr(defaultBase)}">
      <button id="gen">QR-codes genereren</button>
      <button class="ghost" onclick="window.print()">🖨️ Printen</button>
      <p class="note">QR-afbeeldingen worden gemaakt met de gratis dienst api.qrserver.com (internet nodig tijdens het printen).</p>
    </section>
    <div id="qrout"></div>`;
  document.getElementById('gen').onclick=drawQRs;
  drawQRs();
  function drawQRs(){
    const base=document.getElementById('base').value.trim().replace(/#.*$/,'');
    const qr=(data)=>`https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data=${encodeURIComponent(data)}`;
    const out=document.getElementById('qrout');
    let starts=`<section class="card"><h3>START-QR's — geef elke groep een andere</h3><div class="qrgrid">`;
    for(let i=0;i<N;i++){
      starts+=`<div class="qrcard"><img src="${qr(base+'#start='+i)}" alt="start ${i+1}">
        <div class="t">START · Groep ${i+1}</div><div class="d">begint bij: ${escapeHtml(CATS[i].name)}</div></div>`;
    }
    starts+=`</div></section>`;
    let cats=`<section class="card"><h3>CATEGORIE-QR's — verstop deze in het gebouw</h3><div class="qrgrid">`;
    for(let i=0;i<N;i++){
      cats+=`<div class="qrcard"><img src="${qr(base+'#cat='+i)}" alt="cat ${i+1}">
        <div class="t">Categorie ${i+1}: ${escapeHtml(CATS[i].name)}</div><div class="d">verstop bij: ${escapeHtml(CATS[i].hint)}</div></div>`;
    }
    cats+=`</div></section>`;
    out.innerHTML=starts+cats;
  }
}

/* ===================== HELPERS ===================== */
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escapeAttr(s){return String(s).replace(/"/g,'&quot;');}

route();
</script>
